<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="resources/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Build, save, and export Demon's Souls outfits with the souls.fashion outfit simulator."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="resources/styles.css?v=1.0.9.1">
    <link rel="stylesheet" href="resources/content-pages.css?v=1.0.9.1">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/icon_16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/icon_32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicons/icon_48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicons/icon_96x96.png">
    <link rel="apple-touch-icon" type="image/png" sizes="167x167" href="favicons/icon_167x167.png">
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="favicons/icon_180x180.png">
    <link rel="icon" href="favicon.ico">
    <title>Demon's Souls Outfit Simulator - Fashion Souls v1.0.9</title>
</head>
<body
    class="content-page simulator-page"
    data-game-key="demonssouls"
    data-game-title="Demon's Souls"
    data-back-href="demonssouls"
>
<div id="preloader" class="preloader">
    <img src="icons/FS_icon_white.png" alt="souls.fashion" class="preloader-logo">
</div>

<div class="content-shell">
    <header class="content-hero">
        <div class="content-hero-bar">
            <div class="content-hero-left">
                <button class="show-menu" aria-label="Toggle navigation menu"></button>
                <a class="content-brand-link" href="index" aria-label="Fashion Souls home">
                    <img src="icons/FS_icon_white.png" alt="Fashion Souls" class="content-brand-icon">
                </a>
                <div class="content-site-copy">
                    <h3 class="content-site-title">Fashion Souls</h3>
                    <p class="site-tagline">SoulsBorne Fashion Tool by psyopgirl</p>
                </div>
            </div>
            <button class="mode-switch" id="modeToggle" aria-label="Toggle display mode" title="Toggle display mode">&#9680;</button>
        </div>
    </header>

    <main class="content-main simulator-page-main">
        <section class="content-card simulator-page-card">
            <div class="simulator-page-topbar">
                <p class="content-eyebrow">Outfit Simulator - Demon's Souls</p>
            </div>

            <div class="simulator-layout">
                <div class="outfit-sim">
                    <div id="outfitSlotsSimulator" class="simulator-grid" aria-live="polite"></div>
                </div>

                <aside id="presetContainer" class="preset-container" aria-label="Saved presets"></aside>
            </div>
        </section>
    </main>

    <footer class="footer">
        Copyright &copy; psyopgirl 2024.<br>
        Dark Souls, Elden Ring, Bloodborne &amp; Demon's Souls are property of Sony &amp; FromSoftware respectively.
    </footer>
</div>

<script src="resources/js/page-transition.js?v=1.0.9.1"></script>
<script src="resources/js/site-pages.js?v=1.0.9.1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js?v1.0.5"></script>
<script src="resources/js/simulator-page.js?v=1.0.9.1"></script>
</body>
</html>
